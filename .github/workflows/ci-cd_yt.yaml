
name: CI-CD Pipeline-YTELT

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Find Changed Files
        id: changed-files-build
        uses: tj-actions/changed-files@v45
        with:
          # Use a block scalar for multiple patterns (each on its own line)
          files: |
            Dockerfile
            requirements.txt

      - name: Set up Docker Buildx
        if: steps.changed-files-build.outputs.any_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.changed-files-build.outputs.any_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push docker image
        if: steps.changed-files-build.outputs.any_changed == 'true'
        run: |
          docker buildx build \
            --push \
            --tag ${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_REPOSITORY }}:latest \
            --tag ${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.sha }} \
            --file Dockerfile \
            .



                    





              


                

